name: aws-static-site
display_name: "AWS Static Site (S3 + CloudFront)"
description: "S3 bucket with CloudFront CDN distribution for hosting static websites and SPAs with HTTPS and global edge caching."
category: static-site
complexity: beginner
providers: [aws]
tags: [aws, s3, cloudfront, static, cdn, spa, https]

variables:
  - name: aws_region
    type: string
    default: "us-east-1"
    description: "AWS region for S3 bucket (CloudFront is always global)"
  - name: site_domain
    type: string
    default: ""
    description: "Custom domain name (e.g. example.com) — leave empty to use CloudFront default"
  - name: price_class
    type: string
    default: "PriceClass_100"
    description: "CloudFront price class: PriceClass_100 (US/EU), PriceClass_200 (+ Asia), PriceClass_All"
  - name: default_root_object
    type: string
    default: "index.html"
    description: "Default root object served by CloudFront"
  - name: enable_ipv6
    type: bool
    default: true
    description: "Enable IPv6 on the CloudFront distribution"
  - name: environment
    type: string
    default: "production"
    description: "Deployment environment tag"

modules:
  - name: s3-origin
    provider: aws
    depends_on: []
    description: "Private S3 bucket with versioning, configured as CloudFront origin. Bucket policy allows CloudFront OAC access only."
  - name: cloudfront-distribution
    provider: aws
    depends_on: [s3-origin]
    description: "CloudFront distribution with HTTPS, custom error pages (SPA fallback to index.html), and Origin Access Control."

roles:
  - workspace-admin
  - developer
  - read-only

outputs:
  - name: bucket_name
    module: s3-origin
    description: "S3 bucket name for deploying site files"
  - name: cloudfront_domain
    module: cloudfront-distribution
    description: "CloudFront distribution domain name (use as CNAME target)"
  - name: distribution_id
    module: cloudfront-distribution
    description: "CloudFront distribution ID — needed for cache invalidation"
