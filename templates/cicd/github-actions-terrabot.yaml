# TerraBot-powered GitHub Actions workflow.
#
# Uses the terrabot CLI instead of raw terraform for enhanced output,
# drift detection, cost estimation, and plan approval gates.
#
# Behaviour:
#   Pull Request  → terrabot plan + drift check (results posted as PR comment)
#   Push to main  → terrabot apply --auto-approve
#
# Required repository secrets:
#   TERRABOT_API_KEY        — TerraBot API key (X-API-Key)
#   AWS_ACCESS_KEY_ID       (if using AWS provider)
#   AWS_SECRET_ACCESS_KEY   (if using AWS provider)
#   ANTHROPIC_API_KEY       — for AI plan review (optional)
#
# Optional variables:
#   TERRABOT_API_URL  — TerraBot server URL (default: http://localhost:8000)
#   TF_VERSION        — terraform version to install (default: latest)
#   WORKING_DIR       — terraform root module directory (default: .)

name: TerraBot

on:
  push:
    branches: [main]
    paths:
      - "**.tf"
      - "**.tfvars"
      - ".github/workflows/terrabot.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.tf"
      - "**.tfvars"

env:
  TF_VERSION: ${{ vars.TF_VERSION || 'latest' }}
  WORKING_DIR: ${{ vars.WORKING_DIR || '.' }}
  TERRABOT_API_URL: ${{ vars.TERRABOT_API_URL || 'http://localhost:8000' }}
  TF_IN_AUTOMATION: "true"

permissions:
  contents: read
  pull-requests: write

jobs:
  terrabot-plan:
    name: TerraBot Plan & Drift Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install TerraBot
        run: pip install terrabot

      - name: Terraform Init
        run: terraform init -input=false

      - name: TerraBot Plan
        id: plan
        run: |
          terrabot plan --dir . --json > plan_output.json 2>&1 || true
          echo "plan_json=$(cat plan_output.json | head -c 65000)" >> $GITHUB_OUTPUT
        env:
          TERRABOT_API_KEY: ${{ secrets.TERRABOT_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: TerraBot Drift Check
        id: drift
        run: |
          terrabot drift check \
            --workspace "${{ github.repository }}-${{ github.base_ref }}" \
            --dir . \
            --json > drift_output.json 2>&1 || true
          echo "has_drift=$(cat drift_output.json | python3 -c \"import sys,json; d=json.load(sys.stdin); print(d.get('has_drift', False))\")" >> $GITHUB_OUTPUT
        env:
          TERRABOT_API_KEY: ${{ secrets.TERRABOT_API_KEY }}

      - name: Post Results to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let planOutput = '';
            let driftOutput = '';
            try { planOutput = fs.readFileSync('${{ env.WORKING_DIR }}/plan_output.json', 'utf8').slice(0, 4000); } catch {}
            try { driftOutput = fs.readFileSync('${{ env.WORKING_DIR }}/drift_output.json', 'utf8').slice(0, 2000); } catch {}

            const hasDrift = '${{ steps.drift.outputs.has_drift }}' === 'True';
            const driftBadge = hasDrift ? '⚠️ **Drift detected**' : '✅ No drift';

            const body = `## TerraBot Results

            ${driftBadge}

            <details><summary>Plan Output</summary>

            \`\`\`json
            ${planOutput}
            \`\`\`

            </details>

            <details><summary>Drift Check</summary>

            \`\`\`json
            ${driftOutput}
            \`\`\`

            </details>

            *Triggered by @${{ github.actor }}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  terrabot-apply:
    name: TerraBot Apply
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install TerraBot
        run: pip install terrabot

      - name: Terraform Init
        run: terraform init -input=false

      - name: TerraBot Apply
        run: terrabot apply --dir . --auto-approve
        env:
          TERRABOT_API_KEY: ${{ secrets.TERRABOT_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
