networks:
  tony-net:
    external: true
    name: tony-net

services:
  postgres:
    image: postgres:16-alpine
    container_name: powerops-postgres
    restart: always
    environment:
      POSTGRES_DB: powerops
      POSTGRES_USER: powerops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-powerops}
    volumes:
      - powerops-pgdata:/var/lib/postgresql/data
    networks:
      - tony-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U powerops"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  keycloak-db:
    image: postgres:16-alpine
    container_name: powerops-keycloak-db
    restart: always
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
    volumes:
      - powerops-keycloak-pgdata:/var/lib/postgresql/data
    networks:
      - tony-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: powerops-keycloak
    command: start-dev --import-realm
    restart: always
    depends_on:
      keycloak-db:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    networks:
      - tony-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  opa:
    image: openpolicyagent/opa:0.70.0
    container_name: powerops-opa
    command: ["run", "--server", "--addr", ":8181"]
    restart: always
    networks:
      - tony-net
    healthcheck:
      test: ["CMD", "/opa", "version"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  powerops:
    build: .
    container_name: powerops.tonytechlab.com
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      opa:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      - TERRABOT_ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - TERRABOT_DB_URL=postgresql+asyncpg://powerops:${POSTGRES_PASSWORD:-powerops}@postgres:5432/powerops
      - TERRABOT_WORKING_DIR=/app/workspaces
      - TERRABOT_TEMPLATE_DIR=/app/templates
      - TERRABOT_STATE_ENCRYPTION_KEY=${STATE_ENCRYPTION_KEY:-}
      - TERRABOT_JWT_SECRET=${JWT_SECRET:-}
      - TERRABOT_GITHUB_APP_ID=${GITHUB_APP_ID:-0}
      - TERRABOT_GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
      - TERRABOT_OPA_URL=http://opa:8181
      - TERRABOT_KEYCLOAK_URL=http://keycloak:8080
      - TERRABOT_KEYCLOAK_REALM=powerops
      - TERRABOT_KEYCLOAK_CLIENT_ID=powerops-api
      - TERRABOT_KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-}
      - TERRABOT_KEYCLOAK_PUBLIC_URL=${TERRABOT_KEYCLOAK_PUBLIC_URL:-}
    volumes:
      - powerops-data:/app/data
      - powerops-workspaces:/app/workspaces
    networks:
      - tony-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  powerops-pgdata:
  powerops-keycloak-pgdata:
  powerops-data:
  powerops-workspaces:
